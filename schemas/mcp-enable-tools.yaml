overlay: 1.0.0
x-speakeasy-jsonpath: rfc9535
info:
  title: MCP Enable Overlay for Feature Flag Tools
  version: 0.0.1
actions:
  - target: $
    update:
      servers:
        - url: https://app.launchdarkly.com
          description: Prod API server
  - target: $["paths"]["/api/v2/flags/{projectKey}"]["get"]
    update:
      x-speakeasy-mcp:
        description: >
          Retrieves all feature flags within a project, including metadata
          and targeting rules. Enables AI agents to enumerate existing flags for inspection,
          configuration analysis, or generating flag usage reports across environments.
        disabled: false
        name: list-feature-flags
        scopes:
          - read
  - target: $["paths"]["/api/v2/flags/{projectKey}"]["post"]
    update:
      x-speakeasy-mcp:
        description: >
          Creates a new feature flag within a project. AI agents can use
          this operation to define feature toggles for controlled rollouts, experimentation,
          or gated features, automating the flag setup process.
        disabled: false
        name: create-feature-flag
        scopes:
          - write
  - target: $["paths"]["/api/v2/flags/{projectKey}/{featureFlagKey}"]["get"]
    update:
      x-speakeasy-mcp:
        description: >
          Fetches the full configuration for a specific feature flag, including
          environments, variations, and targeting rules. Useful for agents auditing
          or managing specific feature toggles in a detailed, contextual manner.
        disabled: false
        name: get-feature-flag
        scopes:
          - read
  - target: $["paths"]["/api/v2/flags/{projectKey}/{featureFlagKey}"]["patch"]
    update:
      x-speakeasy-mcp:
        description: >
          Updates the configuration of an existing feature flag. Enables
          agents to change targeting rules, modify variations, or adapt rollout strategies
          dynamically in response to user behavior or experiment results.
        disabled: false
        name: update-feature-flag
        scopes:
          - write
  - target: $["paths"]["/api/v2/flags/{projectKey}/{featureFlagKey}"]["delete"]
    update:
      x-speakeasy-mcp:
        description: >
          Removes a feature flag from the project. Used by AI agents to clean
          up deprecated toggles that are no longer in use, improving system hygiene
          and maintainability.
        disabled: false
        name: delete-feature-flag
        scopes:
          - write
  - target: $["paths"]["/api/v2/flag-status/{projectKey}/{featureFlagKey}"]["get"]
    update:
      x-speakeasy-mcp:
        description: >
          Returns lifecycle status (new, active, inactive, launched) based on actual
          usage patterns, evaluation counts, and configuration stability. This is the
          key intelligence for removal readiness assessment.
        disabled: false
        name: get-flag-status-across-environments
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/environments"]["get"]
    update:
      x-speakeasy-mcp:
        description: >
          Identifies which environments exist in a project and determines which are
          marked as "critical" (production, staging, etc.). Allows agents to
          programmatically identify critical environments instead of hardcoding assumptions.
        disabled: false
        name: get-environments
        scopes:
          - read
  - target: $["paths"]["/api/v2/code-refs/repositories"]["get"]
    update:
      x-speakeasy-mcp:
        description: >
          Identifies which repositories have code references to a given flag, helping
          agents determine if they're operating on the correct repository and understand
          the scope of cleanup (single vs multi-repo).
        disabled: false
        name: get-code-references
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs"]["get"]
    update:
      x-speakeasy-mcp:
        description: >
          Retrieves AI configuration settings for a specific project. This
          endpoint allows agents to access and modify AI-related configurations, ensuring
          that the AI's behavior aligns with project requirements and user expectations.
        disabled: false
        name: list-ai-configs
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs"]["post"]
    update:
      x-speakeasy-mcp:
        name: create-ai-config
        description: >
          Creates a new AI Config within a project. Useful for setting up LLM
          configurations programmatically.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}"]["get"]
    update:
      x-speakeasy-mcp:
        name: get-ai-config
        description: Retrieves details of a specific AI Config, including variations and model settings.
        disabled: false
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}"]["patch"]
    update:
      x-speakeasy-mcp:
        name: update-ai-config
        description: Updates metadata or configuration of an existing AI Config.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}"]["delete"]
    update:
      x-speakeasy-mcp:
        name: delete-ai-config
        description: >
          Deletes an AI Config and its associated variations. Intended for
          cleanup or deprecation workflows.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}/targeting"]["get"]
    update:
      x-speakeasy-mcp:
        name: get-ai-config-targeting
        description: Retrieves the targeting details of a specific AI Config, including individual targets, rules, and rollouts.
        disabled: false
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}/targeting"]["patch"]
    update:
      x-speakeasy-mcp:
        name: update-ai-config-targeting
        description: Updates the targeting of an existing AI Config.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}/variations/{variationKey}"]["get"]
    update:
      x-speakeasy-mcp:
        name: get-ai-config-variation
        description: Retrieves an AI configuration variation.
        disabled: false
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}/variations"]["post"]
    update:
      x-speakeasy-mcp:
        name: create-ai-config-variation
        description: >
          Adds a new variation to an AI Config, supporting experimentation or
          multi-model strategies.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}/variations/{variationKey}"]["patch"]
    update:
      x-speakeasy-mcp:
        name: update-ai-config-variation
        description: >
          Updates a specific variation within an AI Config. Enables fine-tuned
          control of model behavior.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/ai-configs/{configKey}/variations/{variationKey}"]["delete"]
    update:
      x-speakeasy-mcp:
        name: delete-ai-config-variation
        description: Deletes an AI Config variation.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/approval-requests"]["get"]
    update:
      x-speakeasy-mcp:
        name: list-approval-requests
        description: >
          Lists all pending approval requests across the account. Enables AI agents
          to discover outstanding change requests that need review, providing visibility
          into the approval pipeline before making flag modifications.
        disabled: false
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/flags/{featureFlagKey}/environments/{environmentKey}/approval-requests"]["get"]
    update:
      x-speakeasy-mcp:
        name: list-flag-approval-requests
        description: >
          Lists all approval requests for a specific feature flag in a given
          environment. Useful for agents to check if there are pending changes awaiting
          review before attempting direct modifications.
        disabled: false
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/flags/{featureFlagKey}/environments/{environmentKey}/approval-requests"]["post"]
    update:
      x-speakeasy-mcp:
        name: create-flag-approval-request
        description: >
          Creates an approval request for changes to a feature flag's targeting
          or variations in a specific environment. Required when the environment has
          mandatory approvals enabled, allowing agents to submit changes for review
          instead of applying them directly.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/flags/{featureFlagKey}/environments/{environmentKey}/approval-requests/{id}"]["get"]
    update:
      x-speakeasy-mcp:
        name: get-flag-approval-request
        description: >
          Retrieves details of a specific approval request for a feature flag,
          including its current status, reviewers, and the proposed changes. Allows
          agents to inspect pending changes before deciding to review or apply them.
        disabled: false
        scopes:
          - read
  - target: $["paths"]["/api/v2/projects/{projectKey}/flags/{featureFlagKey}/environments/{environmentKey}/approval-requests/{id}"]["delete"]
    update:
      x-speakeasy-mcp:
        name: delete-flag-approval-request
        description: >
          Deletes an approval request for a feature flag. Used by agents to
          withdraw a pending change request that is no longer needed or was created
          in error.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/flags/{featureFlagKey}/environments/{environmentKey}/approval-requests/{id}/apply"]["post"]
    update:
      x-speakeasy-mcp:
        name: apply-flag-approval-request
        description: >
          Applies an approved approval request, executing the proposed changes
          to the feature flag. Can only be used after the request has received the
          required number of approvals. Completes the approval workflow by making
          the changes live.
        disabled: false
        scopes:
          - write
  - target: $["paths"]["/api/v2/projects/{projectKey}/flags/{featureFlagKey}/environments/{environmentKey}/approval-requests/{id}/reviews"]["post"]
    update:
      x-speakeasy-mcp:
        name: review-flag-approval-request
        description: >
          Submits a review (approve, decline, or comment) on a pending approval
          request for a feature flag. Enables agents to participate in the approval
          workflow by providing feedback or granting approval for proposed changes.
        disabled: false
        scopes:
          - write
  - target: $.paths.*[?@['x-speakeasy-mcp'].disabled != false]
    update:
      x-speakeasy-ignore: true

